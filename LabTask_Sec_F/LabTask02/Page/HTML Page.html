<!DOCTYPE html>
<html>
    <title> Registration Page </title>
    <head>
        <h1> Student Registration Page </h1>
    </head>

    <form>
        <label for ="Name"> Student Name: </label>
        <input type ="text" id="Name" name ="StudentName" placeholder = "Enter Your Name"> 
        <br><br>

        <label for="CGPA"> Student CGPA:</label>
        <input type="number" id="CGPA" name="StudentCGPA">
        <br><br>

        <label for="GenderMale"> Male: </label>
        <input type = "radio" id="GenderMale" name="Gender" value="Male">
        <br><br>

        <label for="GenderFemale"> Female: </label>
        <input type = "radio" id="GenderFemale" name="Gender" value="Female">
        <br><br>

        <label for ="Depertment"> Select Depertment: </label>
       
        <select>
            <option values="CSE"> CSE </option>
            <option values="EEE"> EEE</option>
            <option values="BBA"> BBA </option>
        </select>

        <br><br>

        <label for ="ID"> Student ID: </label>
        <input type ="number" id="ID" name ="StudentID" > 
        <br><br>


        <label for="Address">Address:</label>
        <textarea id="Address" name ="StudentAddress" rows="5" cols="50" placeholder="Enter your address here"></textarea>
        <br><br>

         <label for="DOB"> Date of Birth: </label>
        <input type="date" id="DOB" name ="StudentDOB">
         <br><br>


         <label for ="Email"> Email: </label>
        <input type ="text" id="Email" name ="StudentEmail" placeholder = "Enter your email"> 
        <br><br>

        <label for="GradeReport"> Upload your Grade Report: </label>
        <input type ="file" id="GradeReport" name="GradeReport">
        <br><br>


        <label for="termandcondition"> I agree to the terms and condition: </label>
        <input type = "checkbox" id="termandcondition" name="termandcondition" >
        <br><br>

        <label for="PhoneNumber"> Phone Number:</label>
        <input type="number" id="PhoneNumber" name="StudentPhoneNumber" placeholder = "Enter your phone number">
        <br><br>

        <label for="Submit"> Submit your information: </label>
        <br><br>
        <input type="submit" id="submit" name="DataSubmit">
        

    </form>


</html>
